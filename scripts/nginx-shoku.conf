# Serves getshoku.com + every café subdomain *.getshoku.com → the Shoku app.
# TLS via a Cloudflare Origin Certificate (SSL/TLS → Origin Server). Set the
# Cloudflare SSL mode to Full (strict), proxy on. Install at
#   /etc/nginx/sites-available/getshoku.com  (symlink into sites-enabled)

server {                       # HTTP → HTTPS
    listen 80;
    listen [::]:80;
    server_name getshoku.com *.getshoku.com;
    return 301 https://$host$request_uri;
}

server {                       # HTTPS — apex + wildcard
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name getshoku.com *.getshoku.com;

    ssl_certificate     /etc/ssl/shoku/origin.crt;
    ssl_certificate_key /etc/ssl/shoku/origin.key;

    client_max_body_size 30m;

    location / {
        proxy_pass http://127.0.0.1:3000;   # match the app's PORT
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
